<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOX FLASH SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Roboto', sans-serif; background:#111; color:#fff; margin:0 }
header { display:flex; align-items:center; justify-content:center; gap:15px; background:linear-gradient(90deg,#ff6600,#ff9900); padding:20px; border-radius:0 0 20px 20px; position:relative }
#logo { height:50px; transition: all 0.5s ease; border-radius:10px; }
#logo.glow { animation: glow 2s infinite alternate; }
@keyframes glow { 0% { box-shadow: 0 0 10px #ff6600, 0 0 20px #ff9900; } 100% { box-shadow: 0 0 30px #ff6600, 0 0 50px #ff9900; } }
header h1 { margin:0; font-size:2.5rem; color:#fff; text-shadow: 2px 2px 8px #ff6600; font-family: 'Orbitron', sans-serif; }
nav { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin:15px }
nav button, select { padding:10px; border-radius:15px; border:none; background:#222; color:#ff6600; cursor:pointer; font-weight:bold; transition: all 0.3s ease; position:relative; overflow:hidden }
nav button:hover { background:#ff6600; color:#111; transform:scale(1.1); }
nav button::after { content:''; position:absolute; width:100%; height:100%; top:0; left:-100%; background:rgba(255,255,255,0.2); transition:0.4s; }
nav button:hover::after { left:100%; }
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px }
.product { background:#222; padding:15px; border-radius:15px; text-align:center; transition: transform 0.3s ease; }
.product:hover { transform: scale(1.02); }
.product img { width:100%; height:200px; object-fit:contain; border-radius:10px }
.product button { background: linear-gradient(135deg, #ff6600, #ff9900); color: #111; border: none; border-radius: 25px; padding: 12px 20px; margin-top: 10px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(255,102,0,0.6); position: relative; overflow: hidden; }
.product button:hover { transform: scale(1.1); box-shadow: 0 0 15px rgba(255,153,0,0.9); }
.product button:active { transform: scale(0.95); }
.product button::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: -100%; background: rgba(255,255,255,0.2); transition: 0.4s; }
.product button:hover::after { left: 100%; }
#cart { position:fixed; right:10px; top:80px; width:300px; background:#222; padding:15px; border-radius:15px; transition: all 0.3s ease; }
#cart.collapsed { height:40px; overflow:hidden; padding:5px; }
#cart-header { display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
#cart-content { display:block; }
#cart.collapsed #cart-content { display:none; }
.cart-item { display:flex; justify-content:space-between; margin:10px 0 }
#cart button { width:100%; margin-top:5px; font-size:1rem; background: #ff6600; color:#111; border-radius:15px; transition:0.3s; cursor:pointer; position:relative; overflow:hidden; }
#cart button:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,153,0,0.9); }
#cart button::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: -100%; background: rgba(255,255,255,0.2); transition: 0.4s; }
#cart button:hover::after { left: 100%; }
</style>
</head>
<body>
<header>
<img id="logo" src="https://via.placeholder.com/100x50?text=LOGO">
<h1>FOX FLASH SHOP</h1>
</header>

<nav>
<button onclick="filterCategory('all')">Tous</button>
<button onclick="filterCategory('cpu')">CPU</button>
<button onclick="filterCategory('gpu')">GPU</button>
<button onclick="filterCategory('ram')">RAM</button>
<button onclick="filterCategory('case')">Boîtiers</button>
<button onclick="filterCategory('psu')">Alim</button>
<button onclick="filterCategory('aircooler')">Ventirad</button>
<button onclick="filterCategory('watercooling')">Watercooling</button>
</nav>

<div class="products" id="products"></div>

<div id="cart">
  <div id="cart-header" onclick="toggleCart()">
    <h2>Panier</h2>
    <span id="cart-toggle">⬆️</span>
  </div>
  <div id="cart-content">
    <div id="cart-items"></div>
    <p>Total: €<span id="total">0</span></p>
    <button onclick="payment()">💳 Paiement</button>
    <button onclick="sendEmail()">📧 Mail</button>
    <button onclick="sendSMS()">📱 SMS</button>
  </div>
</div>

<script>
// Mode admin/consommateur
let isAdmin = false;
if(confirm("Voulez-vous vous connecter en mode admin ?")) {
  let pwd = prompt("Mot de passe admin :");
  if(pwd === "Foxynisol93") isAdmin = true;
}

let cart = JSON.parse(localStorage.getItem('cart')) || [];

// Produits par défaut
let defaultProducts = [
  {name:"Ryzen 5 3600", price:199, img:"https://via.placeholder.com/200x200?text=Ryzen+3600", category:"cpu"},
  {name:"Ryzen 7 5800X", price:399, img:"https://via.placeholder.com/200x200?text=Ryzen+5800X", category:"cpu"},
  {name:"Intel i7-12700", price:419, img:"https://via.placeholder.com/200x200?text=Intel+i7-12700", category:"cpu"},
  {name:"RTX 5050", price:499, img:"https://via.placeholder.com/200x200?text=RTX+5050", category:"gpu"},
  {name:"RTX 5060", price:699, img:"https://via.placeholder.com/200x200?text=RTX+5060", category:"gpu"},
  {name:"Corsair DDR4 2x8", price:89, img:"https://via.placeholder.com/200x200?text=DDR4+2x8", category:"ram"},
  {name:"Corsair DDR5 2x16", price:189, img:"https://via.placeholder.com/200x200?text=DDR5+2x16", category:"ram"},
  {name:"Boîtier CoolerMaster", price:79, img:"https://via.placeholder.com/200x200?text=Boitier", category:"case"},
  {name:"Alimentation 650W", price:69, img:"https://via.placeholder.com/200x200?text=Alim+650W", category:"psu"},
  {name:"Ventirad Noctua", price:59, img:"https://via.placeholder.com/200x200?text=Ventirad", category:"aircooler"},
  {name:"Watercooling Corsair", price:129, img:"https://via.placeholder.com/200x200?text=Watercooling", category:"watercooling"}
];

// Récupérer les produits depuis localStorage si valides
let storedProducts = [];
try { storedProducts = JSON.parse(localStorage.getItem('products')) || []; } catch(e){ storedProducts = []; }
let products = storedProducts.length > 0 ? storedProducts : defaultProducts;
localStorage.setItem('products', JSON.stringify(products));

displayProducts(products);

function displayProducts(list){
  let html='';
  list.forEach((p,i)=>{
    html+=`<div class='product'>
      <img src='${p.img}' ${isAdmin?`onclick="edit(${i},'img')"`:''}>
      <h3>${p.name}</h3>
      <p ${isAdmin?`onclick="edit(${i},'price')"`:''}>€${p.price}</p>
      <button onclick="add(${i})">🛒 Ajouter</button>
    </div>`;
  });
  document.getElementById('products').innerHTML=html;
}

function edit(i,type){
  if(!isAdmin) return;
  let val = prompt('Nouvelle valeur');
  if(type==='price') products[i].price = parseFloat(val)||products[i].price;
  if(type==='img') products[i].img = val||products[i].img;
  localStorage.setItem('products', JSON.stringify(products));
  displayProducts(products);
}

function filterCategory(cat){
  displayProducts(cat==='all'?products:products.filter(p=>p.category===cat));
}

function add(i){
  cart.push(products[i]);
  localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();
}

function remove(i){
  cart.splice(i,1);
  localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  let html=''; let total=0;
  cart.forEach((c,i)=>{total+=c.price; html+=`<div class='cart-item'>${c.name}<button onclick='remove(${i})'>X</button></div>`});
  document.getElementById('cart-items').innerHTML=html;
  document.getElementById('total').innerText=total;
}

function payment(){
  alert("Pour effectuer le paiement :\n1️⃣ Contactez-moi via Mail ou SMS ci-dessous pour passer votre commande.\n2️⃣ Après ma confirmation, vous pourrez effectuer le virement.\nMerci ! 🟠");
}

function sendEmail(){
  alert("Pour passer commande par mail :\ntonynisol0612@gmail.com");
}

function sendSMS(){
  alert("Pour passer commande par SMS :\n07 72 13 67 01");
}

function toggleCart(){
  const cartEl = document.getElementById('cart');
  cartEl.classList.toggle('collapsed');
  document.getElementById('cart-toggle').textContent = cartEl.classList.contains('collapsed') ? '⬇️' : '⬆️';
}

// Admin logo
document.addEventListener('DOMContentLoaded', () => {
  const logoEl = document.getElementById('logo');
  let logo = localStorage.getItem('logo');
  if(logo && logo.startsWith('http')) logoEl.src = logo;
  else logoEl.src = 'https://via.placeholder.com/100x50?text=LOGO';
  if(isAdmin){
    logoEl.classList.add('glow');
    logoEl.style.cursor = 'pointer';
    logoEl.addEventListener('click', () => {
      let url = prompt('Entre le lien direct de ton image (logo)');
      if(url && url.startsWith('http')){
        logoEl.src = url;
        localStorage.setItem('logo', url);
        alert('✅ Logo mis à jour !');
      } else {
        alert('❌ Mets un vrai lien image (http/https)');
      }
    });
  }
});

renderCart();
</script>
</body>
</html>
