<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOX FLASH SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Roboto', sans-serif; background-color: #111; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
    header { background: linear-gradient(90deg, #ff6600, #ff9900); padding: 25px; text-align: center; font-size: 2.5em; font-weight: bold; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 6px 8px rgba(0,0,0,0.4); }
    nav { display: flex; justify-content: center; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
    nav button, #sort { background-color: #222; color: #ff6600; border: none; padding: 12px 20px; border-radius: 15px; cursor: pointer; transition: all 0.3s; font-weight: bold; }
    nav button:hover, #sort:hover { background-color: #ff6600; color: #111; transform: scale(1.05); }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
    .product { background-color: #222; border-radius: 20px; padding: 15px; text-align: center; transition: transform 0.4s, box-shadow 0.4s; cursor: pointer; }
    .product:hover { transform: scale(1.07); box-shadow: 0 10px 20px rgba(255,102,0,0.6); }
    .product img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 10px; border-radius: 15px; }
    .product h3 { margin: 10px 0 5px; }
    .product p { margin: 5px 0; font-weight: bold; }
    .product button { background-color: #ff6600; color: #111; border-radius: 12px; padding: 10px 15px; margin-top: 10px; font-weight: bold; cursor: pointer; }
    .product button:hover { background-color: #ffa64d; }
    #cart { position: fixed; right: 20px; top: 90px; width: 320px; background-color: #222; border-radius: 20px; padding: 20px; box-shadow: 0 6px 10px rgba(0,0,0,0.6); max-height: 80vh; overflow-y: auto; }
    #cart h2 { text-align: center; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; padding: 5px; border-bottom: 1px solid #444; }
    .cart-item button { background-color: #ff3300; color: #fff; border-radius: 10px; padding: 6px 10px; font-size: 0.9em; cursor: pointer; }
    footer { text-align: center; padding: 20px; background-color: #111; border-top: 3px solid #ff6600; }
    audio { display: none; }
</style>
</head>
<body>
<header>FOX FLASH SHOP</header>
<nav>
    <button onclick="filterCategory('all')">Tous</button>
    <button onclick="filterCategory('gpu')">Cartes Graphiques</button>
    <button onclick="filterCategory('cpu')">CPU</button>
    <button onclick="filterCategory('motherboard')">Cartes Mères</button>
    <button onclick="filterCategory('psu')">Alimentations</button>
    <button onclick="filterCategory('case')">Boîtiers</button>
    <button onclick="filterCategory('ram')">RAM</button>
    <select id="sort" onchange="sortProducts(this.value)">
        <option value="default">Trier par défaut</option>
        <option value="asc">Prix croissant</option>
        <option value="desc">Prix décroissant</option>
    </select>
</nav>
<div class="products" id="products"></div>
<div id="cart">
    <h2>Panier</h2>
    <div id="cart-items"></div>
    <p>Total: €<span id="total">0</span></p>
    <button onclick="sendEmail()">Commander par Mail</button>
    <button onclick="sendSMS()">Commander par SMS</button>
</div>
<footer>© 2026 FOX FLASH SHOP</footer>
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>
<script>
let isAdmin = prompt('Entrez le mot de passe admin') === 'Foxynisol93';
let products = JSON.parse(localStorage.getItem('products')) || [
    // GPU
    {id:1,name:'RTX 5050',price:700,category:'gpu',img:'https://via.placeholder.com/250x200?text=RTX+5050'},
    {id:2,name:'RTX 5060',price:800,category:'gpu',img:'https://via.placeholder.com/250x200?text=RTX+5060'},
    {id:3,name:'RTX 5070',price:900,category:'gpu',img:'https://via.placeholder.com/250x200?text=RTX+5070'},
    // CPU AMD AM4/AM5 (Series 3000 à 9000)
    {id:8,name:'Ryzen 3 3100',price:100,category:'cpu',img:'https://via.placeholder.com/250x200?text=Ryzen+3+3100'},
    {id:9,name:'Ryzen 5 3600',price:200,category:'cpu',img:'https://via.placeholder.com/250x200?text=Ryzen+5+3600'},
    {id:10,name:'Ryzen 7 5800X',price:350,category:'cpu',img:'https://via.placeholder.com/250x200?text=Ryzen+7+5800X'},
    {id:11,name:'Ryzen 9 5950X',price:700,category:'cpu',img:'https://via.placeholder.com/250x200?text=Ryzen+9+5950X'},
    {id:12,name:'Ryzen 5 7600X',price:320,category:'cpu',img:'https://via.placeholder.com/250x200?text=Ryzen+5+7600X'},
    {id:13,name:'Ryzen 7 7800X3D',price:500,category:'cpu',img:'https://via.placeholder.com/250x200?text=Ryzen+7+7800X3D'},
    {id:14,name:'Ryzen 9 7950X',price:700,category:'cpu',img:'https://via.placeholder.com/250x200?text=Ryzen+9+7950X'},
    // Cartes mères AM4/AM5
    {id:40,name:'ASUS ROG Strix B550-F',price:200,category:'motherboard',img:'https://via.placeholder.com/250x200?text=B550-F'},
    {id:41,name:'MSI B550 Tomahawk',price:180,category:'motherboard',img:'https://via.placeholder.com/250x200?text=B550+Tomahawk'},
    {id:42,name:'ASUS ROG X670E Crosshair',price:550,category:'motherboard',img:'https://via.placeholder.com/250x200?text=X670E+Crosshair'},
    {id:43,name:'MSI X670 PRO',price:400,category:'motherboard',img:'https://via.placeholder.com/250x200?text=X670+PRO'},
    // Alimentations
    {id:15,name:'Corsair 750W',price:120,category:'psu',img:'https://via.placeholder.com/250x200?text=Corsair+750W'},
    {id:16,name:'EVGA 1000W',price:200,category:'psu',img:'https://via.placeholder.com/250x200?text=EVGA+1000W'},
    {id:17,name:'Seasonic 850W',price:150,category:'psu',img:'https://via.placeholder.com/250x200?text=Seasonic+850W'},
    // Boîtiers
    {id:20,name:'NZXT H510',price:90,category:'case',img:'https://via.placeholder.com/250x200?text=NZXT+H510'},
    {id:21,name:'Corsair iCUE 4000X',price:120,category:'case',img:'https://via.placeholder.com/250x200?text=Corsair+4000X'},
    {id:22,name:'Fractal Design Meshify C',price:110,category:'case',img:'https://via.placeholder.com/250x200?text=Meshify+C'},
    {id:23,name:'Lian Li PC-O11',price:140,category:'case',img:'https://via.placeholder.com/250x200?text=Lian+Li+PC-O11'},
    // RAM DDR4/DDR5 Corsair
    {id:30,name:'Corsair Vengeance DDR4 2x8GB',price:80,category:'ram',img:'https://via.placeholder.com/250x200?text=Corsair+DDR4+2x8GB'},
    {id:31,name:'Corsair Vengeance DDR4 2x16GB',price:150,category:'ram',img:'https://via.placeholder.com/250x200?text=Corsair+DDR4+2x16GB'},
    {id:32,name:'Corsair Dominator DDR5 2x8GB',price:130,category:'ram',img:'https://via.placeholder.com/250x200?text=Corsair+DDR5+2x8GB'},
    {id:33,name:'Corsair Dominator DDR5 2x16GB',price:250,category:'ram',img:'https://via.placeholder.com/250x200?text=Corsair+DDR5+2x16GB'}
];

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function displayProducts(list){
    const container = document.getElementById('products');
    container.innerHTML = '';
    list.forEach((p) => {
        container.innerHTML += `<div class="product">` +
            `<img src='${p.img}' ${isAdmin ? `onclick='editProduct(${p.id}, "img")'` : ''} >` +
            `<h3>${p.name}</h3>` +
            `<p ${isAdmin ? `onclick='editProduct(${p.id}, "price")' style='cursor:pointer;'` : ''}>€${p.price}</p>` +
            `<button onclick='addToCart(${p.id})'>Ajouter au panier</button>` +
        `</div>`;
    });
}

function editProduct(id, field){
    if(!isAdmin) return;
    let product = products.find(p=>p.id===id);
    let value = prompt(`Entrez la nouvelle valeur pour ${field}`);
    if(field==='price') product.price = parseFloat(value) || product.price;
    else if(field==='img') product.img = value || product.img;
    localStorage.setItem('products', JSON.stringify(products));
    displayProducts(products);
}

function filterCategory(cat){ displayProducts(cat==='all'?products:products.filter(p=>p.category===cat)); }
function sortProducts(order){
    let sorted = [...products];
    if(order==='asc') sorted.sort((a,b)=>a.price-b.price);
    else if(order==='desc') sorted.sort((a,b)=>b.price-a.price);
    displayProducts(sorted);
}
function addToCart(id){
    let item = products.find(p=>p.id===id);
    let existing = cart.find(c=>c.id===id);
    if(existing) existing.qty += 1;
    else cart.push({...item, qty:1});
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
}
function removeFromCart(id){ cart = cart.filter(c=>c.id!==id); localStorage.setItem('cart', JSON.stringify(cart)); renderCart(); }
function renderCart(){
    const container = document.getElementById('cart-items');
    container.innerHTML = '';
    let total = 0;
    cart.forEach(c => {
        total += c.price * c.qty;
        container.innerHTML += `<div class='cart-item'><span>${c.name} x${c.qty}</span><button onclick='removeFromCart(${c.id})'>X</button></div>`;
    });
    document.getElementById('total').innerText = total;
}
function sendEmail(){
    if(cart.length===0){alert('Panier vide !'); return;}
    let message='Commande:\n'; cart.forEach(c=>{message+=`${c.name} x${c.qty}\n`;});
    window.location.href=`mailto:tonynisol0612@gmail.com?subject=Commande&body=${encodeURIComponent(message)}`;
}
function sendSMS(){
    if(cart.length===0){alert('Panier vide !'); return;}
    let message='Commande: '; cart.forEach(c=>{message+=`${c.name} x${c.qty}, `;});
    window.open(`sms:0772136701&body=${encodeURIComponent(message)}`);
}

displayProducts(products);
renderCart();
</script>
</body>
</html>
