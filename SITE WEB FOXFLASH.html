<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoxFlash Shop Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family: 'Poppins', sans-serif; background:#050505; color:white; }
header { background:#000; padding:20px; text-align:center; border-bottom:3px solid #ff6a00; }
header h1 { color:#ff6a00; margin:0; font-size:2rem; }
nav { display:flex; flex-wrap:wrap; justify-content:center; background:#111; padding:10px; }
nav button { background:#222; color:#fff; border:none; border-radius:10px; margin:5px; padding:10px 15px; cursor:pointer; transition:0.2s; font-weight:600; }
nav button.active, nav button:hover { background:#ff6a00; color:#000; }
.controls { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; padding:15px; background:#111; }
.controls input { padding:10px; border-radius:10px; border:none; background:#222; color:#fff; width:200px; }
#products-container { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; padding:20px; }
.product { background:#111; padding:15px; border-radius:20px; text-align:center; transition:0.3s; }
.product:hover { transform:translateY(-5px); box-shadow:0 5px 15px rgba(255,106,0,0.5); }
.product img { width:100%; height:160px; object-fit:contain; background:white; border-radius:10px; margin-bottom:10px; }
.product .price { color:#ff6a00; font-weight:bold; margin:5px 0; font-size:1.1rem; }
.product button { background:#ff6a00; border:none; padding:10px 15px; border-radius:20px; color:white; cursor:pointer; transition:0.2s; font-weight:600; width:100%; }
.product button:hover { background:#ffa040; color:#000; }
#cart { position:fixed; right:0; top:0; width:280px; height:100%; background:#0a0a0a; padding:20px; border-left:3px solid #ff6a00; overflow-y:auto; box-sizing:border-box; }
#cart h2 { margin-top:0; color:#ff6a00; text-align:center; }
#cart ul { list-style:none; padding:0; max-height:50%; overflow-y:auto; }
#cart ul li { display:flex; justify-content:space-between; align-items:center; padding:5px 0; font-size:0.95rem; }
#cart ul li button { background:red; border-radius:50%; width:25px; height:25px; font-weight:bold; padding:0; cursor:pointer; }
#cart .order-buttons { margin-top:15px; display:flex; flex-direction:column; gap:10px; }
#cart .order-buttons button { padding:10px; border-radius:20px; font-weight:600; cursor:pointer; border:none; transition:0.2s; }
#cart .order-buttons button.mail { background:#ff6a00; color:#000; }
#cart .order-buttons button.mail:hover { background:#ffa040; }
#cart .order-buttons button.sms { background:#00bfff; color:#000; }
#cart .order-buttons button.sms:hover { background:#33ccff; }
footer { background:#000; text-align:center; padding:10px; border-top:2px solid #ff6a00; width:100%; margin-top:20px; }
@media (max-width:768px) { #cart { position:relative; width:100%; height:auto; border-left:none; border-top:3px solid #ff6a00; margin-top:10px; } nav { flex-direction:column; } .controls { flex-direction:column; gap:5px; } }
</style>
</head>
<body>

<header>
<h1>FoxFlash Shop Pro</h1>
<p>Commande par mail ou SMS</p>
</header>

<nav>
<button class="cat-btn active" data-cat="all">Tous</button>
<button class="cat-btn" data-cat="GPU">GPU</button>
<button class="cat-btn" data-cat="CPU">CPU</button>
<button class="cat-btn" data-cat="RAM">RAM</button>
<button class="cat-btn" data-cat="Cartes-mères">Cartes-mères</button>
<button class="cat-btn" data-cat="Alim">Alimentations</button>
<button class="cat-btn" data-cat="Boitier">Boîtiers</button>
<button class="cat-btn" data-cat="Ventirad">Ventirads</button>
<button class="cat-btn" data-cat="Watercooling">Watercooling</button>
</nav>

<div class="controls">
<input type="text" id="search" placeholder="Rechercher..." oninput="applyFilters()">
</div>

<div id="products-container"></div>

<div id="cart">
<h2>Panier</h2>
<ul id="cartItems"></ul>
<p>Total: <span id="total">0</span>€</p>
<div class="order-buttons">
<button class="mail" onclick="checkoutMail()">Passer commande par mail</button>
<button class="sms" onclick="checkoutSMS()">Passer commande par SMS</button>
</div>
</div>

<footer>
<p>© 2026 FoxFlash Shop</p>
</footer>

<script>
// --- Produits ---
const products = [
  { id:1, name:"RTX 5080", price:1200, type:"GPU", image:"https://via.placeholder.com/300x160?text=RTX+5080" },
  { id:2, name:"RX 7900 XT", price:900, type:"GPU", image:"https://via.placeholder.com/300x160?text=RX+7900+XT" },
  { id:3, name:"Ryzen 5 5600X", price:280, type:"CPU", image:"https://via.placeholder.com/300x160?text=Ryzen+5+5600X" },
  { id:4, name:"Corsair 32GB DDR5", price:300, type:"RAM", image:"https://via.placeholder.com/300x160?text=32GB+DDR5" },
  { id:5, name:"Corsair 16GB DDR4", price:120, type:"RAM", image:"https://via.placeholder.com/300x160?text=16GB+DDR4" },
  { id:6, name:"Asus TUF Gaming B550", price:180, type:"Cartes-mères", image:"https://via.placeholder.com/300x160?text=B550" },
  { id:7, name:"Seasonic 650W", price:90, type:"Alim", image:"https://via.placeholder.com/300x160?text=650W" },
  { id:8, name:"NZXT H510", price:80, type:"Boitier", image:"https://via.placeholder.com/300x160?text=H510" },
  { id:9, name:"Noctua NH-D15", price:100, type:"Ventirad", image:"https://via.placeholder.com/300x160?text=NH-D15" },
  { id:10, name:"Corsair Hydro H100", price:150, type:"Watercooling", image:"https://via.placeholder.com/300x160?text=H100" }
];

let cart = [];

// --- Affichage produits ---
function displayProducts(list){
  document.getElementById("products-container").innerHTML = list.map(p => `
    <div class="product">
      <img src="${p.image}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p class="price">${p.price}€</p>
      <button onclick="addToCart(${p.id})">Ajouter</button>
    </div>
  `).join('');
}
displayProducts(products);

// --- Filtres ---
function applyFilters() {
  const search = document.getElementById("search").value.toLowerCase();
  const category = document.querySelector(".cat-btn.active").dataset.cat;
  let filtered = products.filter(p => p.name.toLowerCase().includes(search));
  if(category !== "all") filtered = filtered.filter(p => p.type === category);
  displayProducts(filtered);
}

// --- Catégories ---
document.querySelectorAll(".cat-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    applyFilters();
  });
});

// --- Panier ---
function addToCart(id){
  const p = products.find(pr=>pr.id===id);
  const item = cart.find(c=>c.id===id);
  if(item) item.qty+=1; else cart.push({...p, qty:1});
  updateCart();
}
function removeFromCart(id){
  cart = cart.filter(c=>c.id!==id);
  updateCart();
}
function updateCart(){
  document.getElementById("cartItems").innerHTML = cart.map(c=>`
    <li>${c.name} x ${c.qty} - ${c.price*c.qty}€
      <button onclick="removeFromCart(${c.id})">×</button>
    </li>
  `).join('');
  document.getElementById("total").textContent = cart.reduce((sum,c)=>sum+c.price*c.qty,0);
}

// --- Commande par mail ---
function checkoutMail(){
  if(cart.length === 0){ alert("Panier vide !"); return; }
  const orderDetails = cart.map(c => `${c.name} x ${c.qty} = ${c.price*c.qty}€`).join('%0D%0A');
  const total = cart.reduce((sum,c)=>sum+c.price*c.qty,0);
  window.location.href = `mailto:tonynisol0612@gmail.com?subject=Nouvelle commande&body=Bonjour,%0D%0A%0D%0AVoici ma commande:%0D%0A${orderDetails}%0D%0ATotal: ${total}€%0D%0A%0D%0AMerci.`;
  cart = [];
  updateCart();
}

// --- Commande par SMS ---
function checkoutSMS(){
  if(cart.length === 0){ alert("Panier vide !"); return; }
  const orderDetails = cart.map(c => `${c.name} x ${c.qty} = ${c.price*c.qty}€`).join('%0A');
  const total = cart.reduce((sum,c)=>sum+c.price*c.qty,0);
  window.location.href = `sms:+33772136701?body=Bonjour,%0AVoici ma commande:%0A${orderDetails}%0ATotal: ${total}€`;
  cart = [];
  updateCart();
}
</script>

</body>
</html>
